<!DOCTYPE html>
<html>
<head>
<title>Take Home Pay</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#120c08;margin:0;padding:16px;color:#f7eee9}
.app{max-width:520px;margin:auto;background:#1f1f1f;padding:22px;border-radius:24px}
h1{font-size:40px;margin:0;color:#f4dcd2}
p{font-size:18px;color:#d3bfb5}
label{display:block;margin-top:14px;font-weight:bold}
input{width:100%;box-sizing:border-box;padding:14px;margin-top:6px;border-radius:14px;border:1px solid #666;background:#2b2b2b;color:white;font-size:18px}
button{width:100%;padding:16px;margin-top:18px;border:0;border-radius:14px;background:#2f8f46;color:white;font-size:20px;font-weight:bold}
.card{background:#2b2b2b;margin-top:18px;padding:16px;border-radius:18px}
.row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #444}
.total{font-size:24px;font-weight:bold;color:#7cff9b}
small{display:block;margin-top:14px;color:#c9aaa0}
</style>
</head>
<body>
<div class="app">
<h1>✈️ Paycheck Estimator</h1>
<p>Enter flight hours, boarding minutes, and per diem.</p>

<label>Hourly Rate</label>
<input id="rate" value="61" type="number">

<label>Flight Hours</label>
<input id="hours" type="number" placeholder="Example: 80">

<label>Boarding Minutes</label>
<input id="boardingMinutes" type="number" placeholder="Example: 420">

<label>Per Diem / Non-taxable Pay</label>
<input id="perdiem" type="number" placeholder="Example: 346">

<button onclick="calc()">Calculate</button>

<div class="card">
<div class="row"><span>Flight Pay</span><b id="flightpay">$0.00</b></div>
<div class="row"><span>Boarding Pay</span><b id="boardingpay">$0.00</b></div>
<div class="row"><span>Gross Taxable Pay</span><b id="gross">$0.00</b></div>
<div class="row"><span>401(k)</span><b id="k401out">$0.00</b></div>
<div class="row"><span>Taxes</span><b id="taxes">$0.00</b></div>
<div class="row"><span>Other Deductions</span><b id="deductions">$0.00</b></div>
<div class="row"><span>Per Diem</span><b id="pd">$0.00</b></div>
<div class="row total"><span>Take Home</span><span id="takehome">$0.00</span></div>
</div>

<label>401(k) %</label>
<input id="k401" value="8" type="number">

<label>Federal Tax %</label>
<input id="fed" value="12" type="number">

<label>State Tax %</label>
<input id="state" value="0" type="number">

<label>Medical Per Check</label>
<input id="medical" value="100.43" type="number">

<label>AFA Dues Per Check</label>
<input id="afa" value="25" type="number">

<label>401(k) Loan Per Check</label>
<input id="loan" value="130.28" type="number">

<label>Other Deductions</label>
<input id="other" value="0" type="number">

<small>Boarding pay is calculated as half your hourly rate for boarding minutes.</small>
</div>

<script>
function n(id){return parseFloat(document.getElementById(id).value)||0}
function money(x){return "$"+x.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}

function calc(){
 let rate=n("rate");
 let hours=n("hours");
 let boardingMinutes=n("boardingMinutes");
 let perdiem=n("perdiem");

 let flightPay=rate*hours;
 let boardingPay=(rate/2/60)*boardingMinutes;
 let gross=flightPay+boardingPay;

 let k401=gross*n("k401")/100;
 let taxable=gross-k401;

 let fed=taxable*n("fed")/100;
 let state=taxable*n("state")/100;
 let fica=gross*0.0765;
 let taxes=fed+state+fica;

 let otherDeductions=n("medical")+n("afa")+n("loan")+n("other");
 let takehome=gross+perdiem-k401-taxes-otherDeductions;

 document.getElementById("flightpay").innerText=money(flightPay);
 document.getElementById("boardingpay").innerText=money(boardingPay);
 document.getElementById("gross").innerText=money(gross);
 document.getElementById("k401out").innerText=money(k401);
 document.getElementById("taxes").innerText=money(taxes);
 document.getElementById("deductions").innerText=money(otherDeductions);
 document.getElementById("pd").innerText=money(perdiem);
 document.getElementById("takehome").innerText=money(takehome);
}
</script>
</body>
</html>
